version: 1
common:
  resourcesPath: ./resources
  logLevel: info
  appLogDestination: console
  daprdLogDestination: console

apps:
  - appID: triage-agent
    appDirPath: ./
    command: ["python3", "06_triage_agent.py"]
    appPort: 8001

  - appID: expert-agent
    appDirPath: ./
    command: ["python3", "06_expert_agent.py"]
    appPort: 8002

  - appID: workflow
    appDirPath: ./
    command: ["python3", "06_workflow_agents.py"]
