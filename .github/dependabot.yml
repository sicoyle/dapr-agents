        update-types: ["version-update:semver-patch"]
  # Docker - Workflow LLM service
  - package-ecosystem: "docker"
    directory: "/quickstarts/05-multi-agent-workflow-k8s/services/workflow-llm"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
