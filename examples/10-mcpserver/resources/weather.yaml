apiVersion: dapr.io/v1alpha1
kind: MCPServer
metadata:
  name: weather
spec:
  catalog:
    displayName: Weather Service
    description: >
      Weather MCP server exposed over SSE on the local network. In
      production this would typically point to an externally-hosted
      MCP weather provider.
    owner:
      team: integrations
    tags:
      - weather
      - sse
  endpoint:
    sse:
      url: http://localhost:8081/sse
      protocolVersion: "2025-03-26"
  middleware:
    beforeCallTool:
      - workflow:
          workflowName: rate_limit_workflow
      - workflow:
          workflowName: input_validation_workflow
    afterCallTool:
      - workflow:
          workflowName: audit_log_workflow
