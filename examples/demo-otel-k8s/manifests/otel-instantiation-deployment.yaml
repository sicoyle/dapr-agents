apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-instantiation
  labels:
    app: otel-instantiation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-instantiation
  template:
    metadata:
      labels:
        app: otel-instantiation
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "otel-instantiation"
        dapr.io/app-port: "8080"
        dapr.io/enable-api-logging: "true"
    spec:
      containers:
      - name: agent
        image: localhost:5001/demo-otel-agent:latest
        command: ["python", "/app/agents/instantiation/app.py"]
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
