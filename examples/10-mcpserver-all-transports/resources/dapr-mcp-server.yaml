# MCPServer: streamableHTTP transport — Kubernetes-hosted dapr-mcp-server.
#
# The dapr-mcp-server exposes Dapr building-block APIs (state, pubsub,
# service invocation, secrets, bindings, actors, etc.) as MCP tools.
# Deploy it to your cluster and point this resource at the in-cluster
# Service URL.
#
# See: https://github.com/dapr/dapr-mcp-server
apiVersion: dapr.io/v1alpha1
kind: MCPServer
metadata:
  name: dapr-mcp
spec:
  catalog:
    displayName: "Dapr MCP Server"
    description: >
      Exposes Dapr building-block APIs (state, pub/sub, service invocation,
      secrets, bindings, actors, conversation, crypto) as MCP tools.
      Hosted in the Kubernetes cluster alongside the Dapr sidecar.
    owner:
      team: platform
    tags:
      - dapr
      - infrastructure
      - kubernetes
  endpoint:
    streamableHTTP:
      # url: http://dapr-mcp-server.default.svc.cluster.local:9092
      url: http://127.0.0.1:9092
      protocolVersion: "2025-03-26"
      timeout: 30s
  middleware:
    beforeCallTool:
      - workflow:
          workflowName: audit_log_workflow
          appID: mcp-agent
    afterCallTool:
      - workflow:
          workflowName: audit_log_workflow
          appID: mcp-agent
scopes:
  - mcp-agent
