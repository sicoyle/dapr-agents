apiVersion: dapr.io/v1alpha1
kind: MCPServer
metadata:
  name: local-tools
spec:
  catalog:
    displayName: "Local Dev Tools"
    description: >
      A lightweight stdio MCP server exposing utility tools (file search,
      text summarization) for local development and testing.
    owner:
      team: dev-experience
    tags:
      - local
      - dev
      - stdio
  endpoint:
    stdio:
      command: python
      args: ["../local_tools_server.py"]
      env:
        - name: LOG_LEVEL
          value: INFO
  middleware:
    beforeCallTool:
      - workflow:
          workflowName: rate_limit_workflow
